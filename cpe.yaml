# yaml-language-server: $schema=https://raw.githubusercontent.com/spachava753/cpe/refs/heads/main/schema/cpe-config-schema.json
mcpServers:
  exa:
    command: exa-mcp
    args: []
    type: stdio
    env:
      EXA_API_KEY: "${EXA_API_KEY}"
    disabledTools:
      - exa_answer
  general:
    command: cpe
    args:
      - --config
      - $HOME/Library/Application Support/cpe/subagent.yaml
      - mcp
      - serve
    type: stdio
  editor:
    type: stdio
    command: editor-mcp
    enabledTools:
      - text_edit
models:
  - ref: glm
    display_name: GLM 5
    id: glm-5
    type: zai
    base_url: https://aag-gateway.fly.dev/zai-coding/
    api_key_env: Z_API_KEY
    context_window: 202752
    max_output: 131072
    input_cost_per_million: 1.0
    output_cost_per_million: 3.2
    generationDefaults:
      temperature: 1
  - ref: flash
    display_name: Gemini 3 Flash Preview
    id: models/gemini-3-flash-preview
    type: gemini
    base_url: https://aag-gateway.fly.dev/gemini/
    api_key_env: GEMINI_API_KEY
    context_window: 1048576
    max_output: 65536
    input_cost_per_million: 4
    output_cost_per_million: 18
    generationDefaults:
      temperature: 1
  - ref: g3
    display_name: Gemini 3 Pro Preview
    id: models/gemini-3-pro-preview
    type: gemini
    base_url: https://aag-gateway.fly.dev/gemini/
    api_key_env: GEMINI_API_KEY
    context_window: 1048576
    max_output: 65536
    input_cost_per_million: 4
    output_cost_per_million: 18
    systemPromptPath: $HOME/Library/Application Support/cpe/gpt_agent_instructions.md
    generationDefaults:
      temperature: 1
  - ref: gpt
    display_name: GPT 5.2
    id: gpt-5.2-2025-12-11
    type: responses
    base_url: https://aag-gateway.fly.dev/openai/
    api_key_env: OPENAI_API_KEY
    context_window: 400000
    max_output: 64000
    input_cost_per_million: 1.75
    output_cost_per_million: 14
    systemPromptPath: $HOME/Library/Application Support/cpe/gpt_agent_instructions.md
  - ref: gptpro
    display_name: GPT 5.2 Pro
    id: gpt-5.2-pro-2025-12-11
    type: responses
    base_url: https://aag-gateway.fly.dev/openai/
    api_key_env: OPENAI_API_KEY
    context_window: 400000
    max_output: 64000
    input_cost_per_million: 1.75
    output_cost_per_million: 14
  - ref: opus
    display_name: Claude Opus 4.6
    id: claude-opus-4-6
    type: anthropic
    base_url: https://aag-gateway.fly.dev/anthropic/
    api_key_env: ""
    auth_method: oauth
    context_window: 200000
    max_output: 64000
    input_cost_per_million: 5
    output_cost_per_million: 25
    generationDefaults:
      temperature: 1
      maxGenerationTokens: 64000
  - ref: haiku
    display_name: Claude Haiku 4.5
    id: claude-haiku-4-5-20251001
    type: anthropic
    base_url: https://aag-gateway.fly.dev/anthropic/
    api_key_env: ""
    auth_method: oauth
    context_window: 200000
    max_output: 64000
    input_cost_per_million: 1
    output_cost_per_million: 5
    patchRequest:
      jsonPatch:
        - op: add
          path: /context_management
          value:
            edits:
              - keep: all
                type: clear_thinking_20251015
      includeHeaders:
        anthropic-beta: interleaved-thinking-2025-05-14,context-management-2025-06-27
    generationDefaults:
      temperature: 1
      maxGenerationTokens: 64000
      thinkingBudget: "45000"
  - ref: sonnet
    display_name: Claude Sonnet 4.5
    id: claude-sonnet-4-5-20250929
    type: anthropic
    base_url: https://aag-gateway.fly.dev/anthropic/
    api_key_env: ""
    auth_method: oauth
    context_window: 1000000
    max_output: 64000
    input_cost_per_million: 3
    output_cost_per_million: 15
    patchRequest:
      jsonPatch:
        - op: add
          path: /context_management
          value:
            edits:
              - keep: all
                type: clear_thinking_20251015
      includeHeaders:
        anthropic-beta: interleaved-thinking-2025-05-14,context-management-2025-06-27
    generationDefaults:
      temperature: 1
      maxGenerationTokens: 64000
      thinkingBudget: "45000"
  - ref: kimi
    display_name: Kimi K2.5
    id: kimi-k2.5
    type: anthropic
    base_url: https://aag-gateway.fly.dev/moonshot-anthropic/
    api_key_env: "MOONSHOT_API_KEY"
    context_window: 256000
    max_output: 64000
    input_cost_per_million: 0.6
    output_cost_per_million: 3
    generationDefaults:
      temperature: 1
      maxGenerationTokens: 64000
  - ref: codex
    display_name: GPT 5.3 Codex
    id: gpt-5.3-codex
    type: responses
    base_url: https://aag-gateway.fly.dev/codex/
    api_key_env: ""
    auth_method: oauth
    context_window: 272000
    max_output: 128000
    systemPromptPath: $HOME/Library/Application Support/cpe/gpt_agent_instructions.md
    generationDefaults:
      thinkingBudget: high
defaults:
  systemPromptPath: $HOME/Library/Application Support/cpe/agent_instructions.md
  model: codex
  timeout: 15m
  codeMode:
    enabled: true
    maxTimeout: 3600
    excludedTools:
      - text_edit
version: "1.0"
