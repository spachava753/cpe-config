# yaml-language-server: $schema=https://raw.githubusercontent.com/spachava753/cpe/refs/heads/main/schema/cpe-config-schema.json
mcpServers:
  exa:
    command: exa-mcp
    args: []
    type: stdio
    env:
      EXA_API_KEY: "${EXA_API_KEY}"
    disabledTools:
      - exa_answer
  general:
    command: cpe
    args:
      - --config
      - $HOME/Library/Application Support/cpe/subagent.yaml
      - mcp
      - serve
    type: stdio
  editor:
    type: stdio
    command: editor-mcp
    enabledTools:
      - text_edit
