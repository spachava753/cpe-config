    base_url: https://aag-gateway.fly.dev/codex/
    api_key_env: ""
    auth_method: oauth
    context_window: 300000
    max_output: 128000
    input_cost_per_million: 2.50
    output_cost_per_million: 15
    cache_read_cost_per_million: 0.25
