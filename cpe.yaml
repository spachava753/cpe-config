    base_url: https://aag-gateway.fly.dev/openai/
    api_key_env: OPENAI_API_KEY
    context_window: 272000
    max_output: 128000
    input_cost_per_million: 21.00
    output_cost_per_million: 168.00
    patchRequest:
      includeHeaders:
        X-AAG-Token: "${AAG_GATEWAY_TOKEN}"
  - ref: opus
    display_name: Claude Opus 4.6
    id: claude-opus-4-6
    type: anthropic
    base_url: https://aag-gateway.fly.dev/anthropic/
    api_key_env: ""
    auth_method: oauth
    context_window: 1000000
    max_output: 64000
    input_cost_per_million: 5
    output_cost_per_million: 25
    cache_read_cost_per_million: 0.5
    cache_write_cost_per_million: 6.25
    patchRequest:
      includeHeaders:
        X-AAG-Token: "${AAG_GATEWAY_TOKEN}"
    generationDefaults:
      temperature: 1
      maxGenerationTokens: 64000
  - ref: sonnet
    display_name: Claude Sonnet 4.5
    id: claude-sonnet-4-5-20250929
    type: anthropic
    base_url: https://aag-gateway.fly.dev/anthropic/
    api_key_env: ""
    auth_method: oauth
    context_window: 1000000
    max_output: 64000
    input_cost_per_million: 3
    output_cost_per_million: 15
    cache_read_cost_per_million: 0.3
    cache_write_cost_per_million: 3.75
    patchRequest:
      jsonPatch:
        - op: add
          path: /context_management
          value:
            edits:
              - keep: all
                type: clear_thinking_20251015
      includeHeaders:
        anthropic-beta: interleaved-thinking-2025-05-14,context-management-2025-06-27
        X-AAG-Token: "${AAG_GATEWAY_TOKEN}"
    generationDefaults:
      temperature: 1
      maxGenerationTokens: 64000
