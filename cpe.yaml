version: "1.0"
models:
  - ref: glm
    display_name: GLM 5.1
    id: glm-5.1
    type: zai
    base_url: https://aag-gateway.fly.dev/zai-coding/
    api_key_env: Z_API_KEY
    context_window: 202752
    max_output: 131072
    input_cost_per_million: 1
    output_cost_per_million: 3.2
    patchRequest:
      includeHeaders: &aagHeaders
        X-AAG-Token: ${AAG_GATEWAY_TOKEN}
    systemPromptPath: $HOME/Library/Application Support/cpe/agent_instructions.md
    timeout: &standardTimeout 1h
    generationParams:
      temperature: 1
    mcpServers: &standardMCPServers
      editor:
        enabledTools:
          - text_edit
        type: builtin
      exa:
        args: []
        command: exa-mcp
        disabledTools:
          - exa_answer
        env:
          EXA_API_KEY: ${EXA_API_KEY}
        type: stdio
    codeMode: &standardCodeMode
      enabled: true
      largeOutputCharLimit: 150000
      localModulePaths:
        - /Users/shashankpachava/dev/cuh
      maxTimeout: 3600
    compaction: &standardCompaction
      autoTriggerThreshold: 0.85
      initialMessageTemplate: |-
        A conversation compaction occurred. Continue the user's request from the
        preserved context below without asking them to repeat prior context unless
        absolutely necessary.

        Original conversation root message:
        {{with index .Dialog 0}}{{range .Blocks}}{{.Content}}
        {{end}}{{end}}

        Compaction summary:
        {{index .ToolArguments "summary"}}
        {{with index .ToolArguments "keyPoints"}}

        Key points:
        {{range .}}- {{.}}
        {{end}}{{end}}{{with index .ToolArguments "completedWork"}}

        Completed work:
        {{range .}}- {{.}}
        {{end}}{{end}}{{with index .ToolArguments "artifacts"}}

        Important artifacts:
        {{range .}}- {{.}}
        {{end}}{{end}}{{with index .ToolArguments "openQuestions"}}

        Open questions:
        {{range .}}- {{.}}
        {{end}}{{end}}

        Immediate next action:
        {{index .ToolArguments "nextAction"}}

        Raw compaction payload JSON:
        {{.ToolArgumentsJSON}}

        Resume from this state and continue the task.
      inputSchema:
        properties:
          artifacts:
            description: Relevant files, functions, commands, URLs, datasets, or outputs that matter for resuming the task.
            items:
              type: string
            type: array
          completedWork:
            description: Meaningful work already completed, such as code changes made, analyses finished, or sources reviewed.
            items:
              type: string
            type: array
          keyPoints:
            description: Important findings, decisions, constraints, assumptions, or caveats to preserve.
            items:
              type: string
            type: array
          nextAction:
            description: The single most important next thing to do immediately after compaction.
            type: string
          openQuestions:
            description: Remaining unknowns, unresolved decisions, or follow-up questions.
            items:
              type: string
            type: array
          summary:
            description: A concise but information-dense summary of the current state of the task.
            type: string
        required:
          - summary
          - nextAction
        type: object
      maxAutoCompactionRestarts: 10
      toolDescription: Compact the current conversation into a fresh linked branch when context usage is high or immediately after a tool result that begins with [COMPACTION WARNING]. Preserve the user's objective, completed work, important findings, constraints, artifacts, open questions, and the next action so you can continue seamlessly without asking the user to restate prior context.
  - ref: gpt
    display_name: GPT 5.5
    id: gpt-5.5
    type: responses
    base_url: https://aag-gateway.fly.dev/codex/
    api_key_env: ""
    auth_method: oauth
    context_window: 272000
    max_output: 128000
    input_cost_per_million: 5
    output_cost_per_million: 30
    cache_read_cost_per_million: 0.5
    patchRequest:
      includeHeaders: *aagHeaders
      jsonPatch:
        - op: add
          path: /service_tier
          value: priority
    systemPromptPath: &gptPrompt $HOME/Library/Application Support/cpe/gpt_agent_instructions.md
    timeout: *standardTimeout
    generationParams:
      thinkingBudget: high
    mcpServers: *standardMCPServers
    codeMode: *standardCodeMode
    compaction: *standardCompaction
  - ref: gptpro
    display_name: GPT 5.5 Pro
    id: gpt-5.5-pro
    type: responses
    base_url: https://aag-gateway.fly.dev/openai/
    api_key_env: OPENAI_API_KEY
    context_window: 272000
    max_output: 128000
    input_cost_per_million: 21
    output_cost_per_million: 168
    patchRequest:
      includeHeaders: *aagHeaders
    systemPromptPath: *gptPrompt
    timeout: *standardTimeout
    mcpServers: *standardMCPServers
    codeMode: *standardCodeMode
    compaction: *standardCompaction
