# yaml-language-server: $schema=https://raw.githubusercontent.com/spachava753/cpe/refs/heads/main/schema/cpe-config-schema.json
version: "1.0"

# Subagent configuration
# This marks this config as a subagent and provides metadata for the orchestrator
subagent:
  name: "subagent"
  description: "A general subagent for delegated task execution. Use this for well-scoped work, one-off investigations, parallel fan-out, review passes, searching, summarization, codebase Q and A, and other bounded tasks where the main agent wants a fresh context window and a concise result back. Capable of file operations, code editing, shell commands, and tool usage within a scoped task boundary. Uses code mode."
  # outputSchemaPath: "./schemas/subagent-output.json"  # Optional: enforce structured output

# MCP server definitions
mcpServers:
  exa:
    command: exa-mcp
    args: []
    type: stdio
    env:
      EXA_API_KEY: "${EXA_API_KEY}"
    disabledTools:
      - exa_answer
  editor:
    type: stdio
    command: editor-mcp
    enabledTools:
      - text_edit

# Model definitions with optional generation defaults
models:
  - ref: glm
    display_name: GLM 5.1
    id: glm-5.1
    type: zai
    base_url: https://aag-gateway.fly.dev/zai-coding/
    api_key_env: Z_API_KEY
    context_window: 202752
    max_output: 131072
    input_cost_per_million: 1.0
    output_cost_per_million: 3.2
    patchRequest:
      includeHeaders:
        X-AAG-Token: "${AAG_GATEWAY_TOKEN}"
    generationDefaults:
      temperature: 1
  - ref: gpt
    display_name: GPT 5.5
    id: gpt-5.5
    type: responses
    base_url: https://aag-gateway.fly.dev/codex/
    api_key_env: ""
    auth_method: oauth
    context_window: 272000
    max_output: 128000
    input_cost_per_million: 5
    output_cost_per_million: 30
    cache_read_cost_per_million: 0.5
    generationDefaults:
      thinkingBudget: high
    patchRequest:
      jsonPatch:
        - op: add
          path: /service_tier
          value: priority
      includeHeaders:
        X-AAG-Token: "${AAG_GATEWAY_TOKEN}"
  - ref: gptpro
    display_name: GPT 5.5 Pro
    id: gpt-5.5-pro
    type: responses
    base_url: https://aag-gateway.fly.dev/openai/
    api_key_env: OPENAI_API_KEY
    context_window: 272000
    max_output: 128000
    input_cost_per_million: 21.00
    output_cost_per_million: 168.00
    patchRequest:
      includeHeaders:
        X-AAG-Token: "${AAG_GATEWAY_TOKEN}"

# Global defaults
defaults:
  systemPromptPath: $HOME/Library/Application Support/cpe/subagent_instructions.md
  model: glm
  timeout: 1h
  codeMode:
    enabled: true
    maxTimeout: 3600
    largeOutputCharLimit: 150000
    localModulePaths:
      - /Users/shashankpachava/dev/cuh
    excludedTools:
      - text_edit
  compaction:
    enabled: true
    autoTriggerThreshold: 0.85
    maxAutoCompactionRestarts: 5
    toolDescription: >-
      Compact the current subagent conversation into a fresh linked branch when
      context usage is high or immediately after a tool result that begins with
      [COMPACTION WARNING]. Preserve the delegated objective, completed work,
      important findings, constraints, artifacts, open questions, and the next
      action so execution can continue without losing task state.
    inputSchema:
      type: object
      additionalProperties: false
      properties:
        summary:
          type: string
          description: A concise but information-dense summary of the current state of the task.
        keyPoints:
          type: array
          items:
            type: string
          description: Important findings, decisions, constraints, assumptions, or caveats to preserve.
        completedWork:
          type: array
          items:
            type: string
          description: Meaningful work already completed, such as code changes made, analyses finished, or sources reviewed.
        artifacts:
          type: array
          items:
            type: string
          description: Relevant files, functions, commands, URLs, datasets, or outputs that matter for resuming the task.
        openQuestions:
          type: array
          items:
            type: string
          description: Remaining unknowns, unresolved decisions, or follow-up questions.
        nextAction:
          type: string
          description: The single most important next thing to do immediately after compaction.
      required:
        - summary
        - nextAction
    initialMessageTemplate: |-
      A subagent conversation compaction occurred. Continue the delegated task
      from the preserved context below without asking for prior context to be
      repeated unless absolutely necessary.

      Original delegated prompt:
      {{.OriginalUserMessage}}

      Compaction summary:
      {{index .ToolInput "summary"}}
      {{with index .ToolInput "keyPoints"}}

      Key points:
      {{range .}}- {{.}}
      {{end}}{{end}}{{with index .ToolInput "completedWork"}}

      Completed work:
      {{range .}}- {{.}}
      {{end}}{{end}}{{with index .ToolInput "artifacts"}}

      Important artifacts:
      {{range .}}- {{.}}
      {{end}}{{end}}{{with index .ToolInput "openQuestions"}}

      Open questions:
      {{range .}}- {{.}}
      {{end}}{{end}}

      Immediate next action:
      {{index .ToolInput "nextAction"}}

      Resume from this state and continue the delegated task for the
      orchestrator.
