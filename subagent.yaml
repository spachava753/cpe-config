# yaml-language-server: $schema=https://raw.githubusercontent.com/spachava753/cpe/refs/heads/main/schema/cpe-config-schema.json
version: "1.0"

# Subagent configuration
# This marks this config as a subagent and provides metadata for the orchestrator
subagent:
  name: "subagent"
  description: "A general subagent for delegated task execution. The model that powers this is an intelligent workhorse, capable of many different types of tasks. Use this for well-scoped tasks, or one-off tasks to gather information, such as for searching and summarizing, questions of third party codebases or code, Q and A across some text, etc. Also recommened to use launch multuple subagents in parallel where possible for reducing latency and finishing work faster. Capable of file operations, code editing, shell commands, and tool usage within a scoped task boundary. Uses code mode"
  # outputSchemaPath: "./schemas/subagent-output.json"  # Optional: enforce structured output

# MCP server definitions
mcpServers:
  exa:
    command: exa-mcp
    args: []
    type: stdio
    env:
      EXA_API_KEY: "${EXA_API_KEY}"
    disabledTools:
      - exa_answer
  editor:
    type: stdio
    command: editor-mcp
    enabledTools:
      - text_edit

# Model definitions with optional generation defaults
models:
  - ref: glm
    display_name: GLM 5
    id: glm-5
    type: zai
    base_url: https://aag-gateway.fly.dev/zai-coding/
    api_key_env: Z_API_KEY
    context_window: 202752
    max_output: 131072
    input_cost_per_million: 1.0
    output_cost_per_million: 3.2
    generationDefaults:
      temperature: 1
  - ref: opus
    display_name: "Claude Opus 4.5"
    id: claude-opus-4-5-20251101
    type: anthropic
    # base_url: https://gateway.ai.cloudflare.com/v1/4eee6dd2fdc8cebc7802c5a638f460fe/cpe/anthropic/
    base_url: https://aag-gateway.fly.dev/anthropic/
    auth_method: "oauth"
    context_window: 200000
    max_output: 64000
    input_cost_per_million: 5
    output_cost_per_million: 25
    generationDefaults:
      temperature: 1.0
      maxGenerationTokens: 64000
      thinkingBudget: "45000"
    patchRequest:
      includeHeaders:
        anthropic-beta: interleaved-thinking-2025-05-14
  - ref: codex
    display_name: GPT 5.3 Codex
    id: gpt-5.3-codex
    type: responses
    base_url: https://aag-gateway.fly.dev/codex/
    api_key_env: ""
    auth_method: oauth
    context_window: 272000
    max_output: 128000
    input_cost_per_million: 1.75
    output_cost_per_million: 14
    cache_read_cost_per_million: 0.175
    systemPromptPath: $HOME/Library/Application Support/cpe/gpt_agent_instructions.md
    generationDefaults:
      thinkingBudget: xhigh
  - ref: gpt
    display_name: GPT 5.4
    id: gpt-5.4
    type: responses
    base_url: https://aag-gateway.fly.dev/codex/
    api_key_env: ""
    auth_method: oauth
    context_window: 272000
    max_output: 128000
    input_cost_per_million: 1.75
    output_cost_per_million: 14
    cache_read_cost_per_million: 0.175
    systemPromptPath: $HOME/Library/Application Support/cpe/gpt_agent_instructions.md
    generationDefaults:
      thinkingBudget: xhigh

# Global defaults
defaults:
  systemPromptPath: "$HOME/Library/Application Support/cpe/subagent_instructions.md"
  model: gpt
  timeout: "30m"
  codeMode:
    enabled: true
    excludedTools:
      - text_edit
